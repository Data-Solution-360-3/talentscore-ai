services:
  - type: web
    name: talentscore-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Core
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: talentscore
      - key: SECRET_KEY
        sync: false
      - key: APP_URL
        value: https://talentscore-ai.onrender.com

      # Email (Gmail SMTP) — required for OTP + team invites
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

      # Stripe (international payments)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false

      # SSLCommerz (Bangladesh local payments)
      - key: SSLCOMMERZ_STORE_ID
        sync: false
      - key: SSLCOMMERZ_STORE_PASS
        sync: false
      - key: SSLCOMMERZ_SANDBOX
        value: "false"
    autoDeploy: true
