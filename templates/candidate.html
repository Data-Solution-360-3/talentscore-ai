<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235b5ef4'/><polygon points='16,4 19.5,12 28,13 22,19 23.5,28 16,24 8.5,28 10,19 4,13 12.5,12' fill='white'/></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Detail — TopCandidate</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05070f;--surface:#0d1117;--s2:#161b27;--s3:#1e2535;
  --border:#1e2535;--border2:#2a3347;
  --text:#f0f2f8;--t2:#8892aa;--t3:#4a5568;
  --accent:#5b5ef4;--ag:rgba(91,94,244,.15);--ab:rgba(91,94,244,.3);
  --green:#10b981;--gg:rgba(16,185,129,.12);--gb:rgba(16,185,129,.3);
  --amber:#f59e0b;--amg:rgba(245,158,11,.12);--amb:rgba(245,158,11,.3);
  --red:#f43f5e;--rg:rgba(244,63,94,.12);--rb:rgba(244,63,94,.3);
  --blue:#38bdf8;--blg:rgba(56,189,248,.1);--blb:rgba(56,189,248,.25);
  --r:14px;--rs:10px
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:rgba(5,7,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1rem}
.tli{width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tln{font-size:15px;font-weight:700}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn-back{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--border2);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .15s}
.btn-back:hover{background:var(--s3);color:var(--text)}
.btn-primary{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-primary:hover{background:#4a4de0}
.layout{display:grid;grid-template-columns:1fr 400px;height:calc(100vh - 56px);margin-top:56px;overflow:hidden}
.detail-panel{overflow-y:auto;padding:1.75rem;background:var(--bg)}
.cv-panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.cv-panel-hd{padding:.9rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cv-panel-title{font-size:13px;font-weight:600}
.cv-panel-sub{font-size:11px;color:var(--t3);margin-top:1px}
.cv-actions{display:flex;gap:5px}
.cv-btn{padding:4px 9px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid var(--border2);background:var(--s2);color:var(--t2);transition:all .15s}
.cv-btn:hover{background:var(--s3);color:var(--text)}
.cv-viewer{flex:1;overflow-y:auto;background:#333;padding:10px}
.cv-page{background:#fff;border-radius:4px;margin-bottom:8px;overflow:hidden}
.cv-page canvas{display:block;width:100%!important;height:auto!important}
.cv-text-view{background:var(--bg);padding:1rem;font-size:12px;color:var(--t2);line-height:1.8;white-space:pre-wrap;font-family:inherit;min-height:100%}
.cv-no-file{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t3);text-align:center;padding:2rem;background:var(--bg)}
.cv-no-file p{font-size:13px;line-height:1.6;margin-top:1rem}
.spinner-wrap{text-align:center;padding:2rem}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;margin-bottom:10px}
.card-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.candidate-hd{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:10px;display:flex;align-items:center;gap:1rem}
.avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a855f7);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0}
.cand-name{font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:3px}
.cand-role{font-size:13px;color:var(--t2);margin-bottom:8px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--s2);border:1px solid var(--border2);color:var(--t2)}
.chip.bl{background:var(--blg);border-color:var(--blb);color:var(--blue)}
.chip.ac{background:var(--ag);border-color:var(--ab);color:#a5b4fc}
.score-hd{display:flex;align-items:center;gap:1.1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;margin-bottom:10px}
.score-circle{width:78px;height:78px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:3px solid var(--border2)}
.snum{font-size:24px;font-weight:800;letter-spacing:-1px}
.sden{font-size:10px;color:var(--t3);margin-top:-1px}
.rpill{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:7px 14px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;margin-bottom:6px}
.rsh{background:var(--gg);color:var(--green);border:1px solid var(--gb)}
.rh2{background:rgba(16,185,129,.08);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.rm{background:var(--amg);color:var(--amber);border:1px solid var(--amb)}
.rr{background:var(--rg);color:var(--red);border:1px solid var(--rb)}
.rreason{font-size:12px;color:var(--t2);line-height:1.5;max-width:180px}
.conf-strip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px;margin-bottom:10px}
.clbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.cbadge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid}
.ch{background:var(--gg);color:var(--green);border-color:var(--gb)}
.cm{background:var(--amg);color:var(--amber);border-color:var(--amb)}
.cl{background:var(--rg);color:var(--red);border-color:var(--rb)}
.cmeta{font-size:11px;color:var(--t3);margin-left:auto}
.sum-txt{font-size:13px;color:var(--t2);line-height:1.75}
.cov-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.cov-lbl{font-size:11px;font-weight:600;color:var(--t3);width:100px;flex-shrink:0}
.cov-bg{flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.cov-fill{height:100%;border-radius:3px;transition:width 1s}
.cov-pct{font-size:12px;font-weight:700;width:32px;text-align:right;flex-shrink:0}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sg{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:.85rem;position:relative;overflow:hidden}
.sg-top{height:3px;position:absolute;top:0;left:0;right:0}
.sg-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;margin-top:3px}
.sg-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--t2)}
.sg-wt{font-size:10px;color:var(--t3);margin-top:1px}
.sg-score{font-size:18px;font-weight:800;letter-spacing:-.5px}
.bar-bg{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:6px}
.bar-fill{height:100%;border-radius:2px;width:0;transition:width .9s cubic-bezier(.4,0,.2,1)}
.sg-fb{font-size:11px;color:var(--t2);line-height:1.5;margin-bottom:6px}
.pills{display:flex;flex-wrap:wrap;gap:3px}
.pg{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--gg);color:var(--green);border:1px solid var(--gb)}
.pr{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--rg);color:#fda4af;border:1px solid var(--rb)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.lc{border-radius:var(--rs);padding:.9rem;border:1px solid}
.lcg{background:var(--gg);border-color:var(--gb)}.lcr{background:var(--rg);border-color:var(--rb)}
.lcb{background:var(--blg);border-color:var(--blb)}.lca{background:var(--amg);border-color:var(--amb)}
.lct{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.lcg .lct{color:var(--green)}.lcr .lct{color:#fda4af}.lcb .lct{color:var(--blue)}.lca .lct{color:var(--amber)}
.ll{list-style:none}
.ll li{font-size:12px;color:var(--t2);line-height:1.5;padding:4px 0;display:flex;gap:6px;border-bottom:1px solid rgba(255,255,255,.04)}
.ll li:last-child{border-bottom:none;padding-bottom:0}
.ll li::before{content:'';flex-shrink:0;width:5px;height:5px;border-radius:50%;margin-top:5px}
.lcg .ll li::before{background:var(--green)}.lcr .ll li::before{background:var(--red)}
.lcb .ll li::before{background:var(--blue)}.lca .ll li::before{background:var(--amber)}
.pt{font-size:12px;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.pt:hover{color:#a5b4fc}
.pb{display:none;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px;margin-top:8px;font-size:11px;font-family:monospace;white-space:pre-wrap;color:#7dd3fc;max-height:200px;overflow-y:auto;line-height:1.6}
@media(max-width:860px){.layout{grid-template-columns:1fr;height:auto}.cv-panel{height:500px;border-left:none;border-top:1px solid var(--border)}}
@media(max-width:520px){.sgrid,.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="topbar">
  <div class="tli"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
  <span class="tln">TopCandidate<span style="color:#fb923c">.pro</span></span>
  <div class="topbar-actions">
    <a href="/" class="btn-back"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Back to dashboard</a>
    <button class="btn-primary" onclick="window.print()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Print report</button>
  </div>
</header>

<div class="layout">
  <div class="detail-panel" id="detail-panel">
    <div class="spinner-wrap"><div class="spinner"></div><p style="font-size:13px;color:var(--t3)">Loading...</p></div>
  </div>
  <div class="cv-panel">
    <div class="cv-panel-hd">
      <div><div class="cv-panel-title">CV Document</div><div class="cv-panel-sub" id="cv-fname">Loading...</div></div>
      <div class="cv-actions">
        <button class="cv-btn" onclick="changeZoom(-0.15)">−</button>
        <button class="cv-btn" id="zoom-lbl" style="min-width:40px;text-align:center">100%</button>
        <button class="cv-btn" onclick="changeZoom(0.15)">+</button>
        <button class="cv-btn" onclick="toggleView()">Text</button>
      </div>
    </div>
    <div class="cv-viewer" id="cv-viewer">
      <div class="spinner-wrap"><div class="spinner"></div><p style="font-size:12px;color:var(--t3)">Loading CV...</p></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

const id = new URLSearchParams(window.location.search).get('id');
let data = null, zoom = 1.0, showText = false, cvText = '', pdfURL = null;

if (!id) location.href = '/';

async function load() {
  try {
    const res = await fetch('/api/screenings/' + id, {credentials:'include'});
    if (!res.ok) throw new Error('Not found');
    data = await res.json();
    render(data);
    buildCVText(data);
    tryLoadPDF(data);
  } catch(e) {
    document.getElementById('detail-panel').innerHTML = '<p style="color:var(--red);padding:2rem">Could not load. <a href="/" style="color:var(--accent)">Go back</a></p>';
  }
}

function gc(p){
  if(p>=80)return{b:'#10b981',t:'#10b981',br:'rgba(16,185,129,.35)'};
  if(p>=60)return{b:'#f59e0b',t:'#f59e0b',br:'rgba(245,158,11,.35)'};
  return{b:'#f43f5e',t:'#f43f5e',br:'rgba(244,63,94,.35)'};
}
function rcls(r){return{'STRONG HIRE':'rsh','HIRE':'rh2','MAYBE':'rm','REJECT':'rr'}[r]||'rm';}
function rico(r){
  if(r==='STRONG HIRE'||r==='HIRE')return'<polyline points="20 6 9 17 4 12"/>';
  if(r==='MAYBE')return'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  return'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
}
function initials(n){if(!n||n==='Unknown')return'?';return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}

function render(d){
  const score=Math.round(d.overall_score||0);
  const col=gc(score);
  const rec=(d.recommendation||'MAYBE').toUpperCase();
  const sc=d.score_consistency||{};
  const cov=d.skills_coverage_pct||0;
  const date=d.created_at?new Date(d.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—';

  document.getElementById('detail-panel').innerHTML = `
    <div class="candidate-hd">
      <div class="avatar">${initials(d.candidate_name)}</div>
      <div style="flex:1">
        <div class="cand-name">${d.candidate_name||'Unknown'}</div>
        <div class="cand-role">${d.current_title||'—'}</div>
        <div class="chips">
          <span class="chip">${d.years_experience||'?'} yrs exp</span>
          <span class="chip bl">${cov}% skills matched</span>
          ${d.batch?'<span class="chip ac">Batch</span>':''}
          <span class="chip">${date}</span>
        </div>
      </div>
    </div>

    <div class="score-hd">
      <div class="score-circle" style="border-color:${col.br}">
        <span class="snum" style="color:${col.t}">${score}</span>
        <span class="sden">/100</span>
      </div>
      <div style="flex:1">
        <div class="rpill ${rcls(rec)}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${rico(rec)}</svg>
          ${rec}
        </div>
        <div class="rreason">${d.recommendation_reason||''}</div>
      </div>
    </div>

    <div class="conf-strip">
      <span class="clbl">Confidence</span>
      <span class="cbadge ${sc.confidence==='High'?'ch':sc.confidence==='Medium'?'cm':'cl'}">${sc.confidence||'High'}</span>
      <span class="cmeta">Run 1: ${sc.run_1||'—'} · Run 2: ${sc.run_2||'—'} · Δ ${sc.difference||0} pts</span>
    </div>

    <div class="card">
      <div class="card-ttl">AI Assessment</div>
      <div class="sum-txt">${d.summary||'—'}</div>
      <div class="cov-row">
        <div class="cov-lbl">Skills coverage</div>
        <div class="cov-bg"><div class="cov-fill" id="cov-fill" style="background:${cov>=70?'#10b981':cov>=50?'#f59e0b':'#f43f5e'}"></div></div>
        <div class="cov-pct" style="color:${cov>=70?'#10b981':cov>=50?'#f59e0b':'#f43f5e'}">${cov}%</div>
      </div>
    </div>

    <div class="card">
      <div class="card-ttl">Score breakdown</div>
      <div class="sgrid" id="sgrid"></div>
    </div>

    <div class="two-col">
      <div class="lc lcg"><div class="lct">Key strengths</div><ul class="ll" id="strl"></ul></div>
      <div class="lc lcr"><div class="lct">Critical gaps</div><ul class="ll" id="gapl"></ul></div>
    </div>
    <div class="two-col">
      <div class="lc lcb"><div class="lct">Interview questions</div><ul class="ll" id="ql"></ul></div>
      <div class="lc lca"><div class="lct">Hiring risks</div><ul class="ll" id="rl"></ul></div>
    </div>

    <div class="card">
      <div class="card-ttl">Parsed data</div>
      <span class="pt" onclick="tog('pd-cv')">▶ Parsed CV profile</span>
      <div class="pb" id="pd-cv"></div>
      <br style="margin-bottom:6px">
      <span class="pt" onclick="tog('pd-jd')">▶ Parsed JD requirements</span>
      <div class="pb" id="pd-jd"></div>
    </div>`;

  setTimeout(()=>{const f=document.getElementById('cov-fill');if(f)f.style.width=cov+'%';},200);

  const grid=document.getElementById('sgrid');
  (d.dimensions||[]).forEach(dim=>{
    const p=Math.round((dim.score/20)*100);const c=gc(p);
    const wt=dim.weight?Math.round(dim.weight*100)+'%':'';
    const mp=(dim.matched_skills||[]).slice(0,3).map(s=>'<span class="pg">'+s+'</span>').join('');
    const rp=(dim.missing_skills||[]).slice(0,3).map(s=>'<span class="pr">'+s+'</span>').join('');
    const el=document.createElement('div');el.className='sg';
    el.innerHTML='<div class="sg-top" style="background:'+c.b+'"></div><div class="sg-hd"><div><div class="sg-name">'+dim.name+'</div>'+(wt?'<div class="sg-wt">'+wt+' weight</div>':'')+
      '</div><span class="sg-score" style="color:'+c.t+'">'+dim.score.toFixed(1)+'<span style="font-size:10px;font-weight:400;opacity:.4">/20</span></span></div>'+
      '<div class="bar-bg"><div class="bar-fill" style="background:'+c.b+'" data-pct="'+p+'"></div></div>'+
      '<p class="sg-fb">'+(dim.feedback||'')+'</p><div class="pills">'+(mp||'')+(rp||'')+'</div>';
    grid.appendChild(el);
  });
  setTimeout(()=>{document.querySelectorAll('.bar-fill').forEach(b=>{b.style.width=b.dataset.pct+'%';});},300);

  document.getElementById('strl').innerHTML=(d.key_strengths||[]).map(s=>'<li>'+s+'</li>').join('');
  document.getElementById('gapl').innerHTML=(d.critical_gaps||[]).map(s=>'<li>'+s+'</li>').join('');
  document.getElementById('ql').innerHTML=(d.interview_questions||[]).map(s=>'<li>'+s+'</li>').join('');
  document.getElementById('rl').innerHTML=(d.hiring_risks||['None identified']).map(s=>'<li>'+s+'</li>').join('');
  document.getElementById('pd-cv').textContent=JSON.stringify(d.parsed_cv||{},null,2);
  document.getElementById('pd-jd').textContent=JSON.stringify(d.parsed_jd||{},null,2);
}

function buildCVText(d){
  const cv=d.parsed_cv||{};
  let t='';
  if(cv.personal){t+=(cv.personal.name||'')+'\n'+(cv.personal.email||'')+' '+( cv.personal.phone||'')+'\n'+(cv.personal.location||'')+'\n\n';}
  if(d.summary)t+='SUMMARY\n'+d.summary+'\n\n';
  if(cv.work_experience&&cv.work_experience.length){
    t+='WORK EXPERIENCE\n';
    cv.work_experience.forEach(w=>{
      t+=w.title+' at '+w.company+' ('+(w.duration||'')+')\n';
      (w.responsibilities||[]).forEach(r=>{t+='  • '+r+'\n';});
      (w.achievements||[]).forEach(a=>{t+='  ★ '+a+'\n';});
      t+='\n';
    });
  }
  if(cv.education&&cv.education.length){t+='EDUCATION\n';cv.education.forEach(e=>{t+=e.degree+' in '+e.field+' — '+e.institution+' ('+(e.year||'')+')\n';});t+='\n';}
  if(cv.skills){
    t+='SKILLS\n';
    if(cv.skills.technical&&cv.skills.technical.length)t+='Technical: '+cv.skills.technical.join(', ')+'\n';
    if(cv.skills.languages&&cv.skills.languages.length)t+='Languages: '+cv.skills.languages.join(', ')+'\n';
    if(cv.skills.tools&&cv.skills.tools.length)t+='Tools: '+cv.skills.tools.join(', ')+'\n';
    if(cv.skills.frameworks&&cv.skills.frameworks.length)t+='Frameworks: '+cv.skills.frameworks.join(', ')+'\n';
  }
  if(cv.certifications&&cv.certifications.length)t+='\nCERTIFICATIONS\n'+cv.certifications.join('\n')+'\n';
  cvText=t;
  document.getElementById('cv-fname').textContent=d.source_file||(d.candidate_name?d.candidate_name+'.pdf':'CV document');
}

async function tryLoadPDF(d){
  try{
    const res=await fetch('/api/screenings/'+d._id+'/cv', {credentials:'include'});
    if(!res.ok)throw new Error('no pdf');
    const blob=await res.blob();
    pdfURL=URL.createObjectURL(blob);
    renderPDF();
  }catch(e){
    showTextView();
  }
}

async function renderPDF(){
  const viewer=document.getElementById('cv-viewer');
  viewer.innerHTML='<div class="spinner-wrap"><div class="spinner"></div><p style="font-size:12px;color:var(--t3)">Rendering pages...</p></div>';
  try{
    const pdf=await pdfjsLib.getDocument(pdfURL).promise;
    viewer.innerHTML='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const vp=page.getViewport({scale:zoom*1.8});
      const wrap=document.createElement('div');wrap.className='cv-page';
      const canvas=document.createElement('canvas');
      canvas.width=vp.width;canvas.height=vp.height;
      wrap.appendChild(canvas);viewer.appendChild(wrap);
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    }
  }catch(e){showTextView();}
}

function showTextView(){
  document.getElementById('cv-viewer').innerHTML=
    '<div style="padding:6px"><div style="font-size:11px;color:var(--t3);margin-bottom:6px;padding:5px 8px;background:var(--s3);border-radius:5px">Showing AI-extracted CV content</div><div class="cv-text-view">'+(cvText||'No content available.')+'</div></div>';
}

function changeZoom(d){
  zoom=Math.max(0.5,Math.min(2.5,zoom+d));
  document.getElementById('zoom-lbl').textContent=Math.round(zoom*100)+'%';
  if(pdfURL&&!showText)renderPDF();
}

function toggleView(){
  showText=!showText;
  if(showText)showTextView();
  else if(pdfURL)renderPDF();
  else showTextView();
}

function tog(id){const e=document.getElementById(id);e.style.display=e.style.display==='block'?'none':'block';}

load();
</script>
